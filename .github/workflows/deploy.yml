# =============================================================================
#  Deploy Pipeline — GitOps via ArgoCD
#  Reads the EXACT version from the Build workflow (single source of truth).
#  Never recalculates the version. Never invents a new one.
# =============================================================================

name: Deploy

on:
  workflow_run:
    workflows: ["Build & Push"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      version:
        description: "Exact image version to deploy (e.g. v0.1.48)"
        required: true
        type: string

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Deploy to EKS (GitOps)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Get version from Build artifact or manual input ────────────────────
      - name: Download version artifact
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: build-version
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ -f version.txt ]; then
            VERSION=$(cat version.txt | tr -d '\n')
          else
            echo "❌ ERROR: No version found. Cannot deploy."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "══════════════════════════════════════"
          echo "🚀 Deploying version: $VERSION"
          echo "══════════════════════════════════════"

      # ── Update Helm values with the exact image tag ────────────────────────
      - name: Update image tags in Helm values
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update backend values-production.yaml image tag
          sed -i "s|^  tag:.*|  tag: \"$VERSION\"|" \
            infrastructure/helm/backend/values-production.yaml 2>/dev/null || true

          # Update frontend values-production.yaml image tag
          sed -i "s|^  tag:.*|  tag: \"$VERSION\"|" \
            infrastructure/helm/frontend/values-production.yaml 2>/dev/null || true

          echo "✅ Helm values updated to version: $VERSION"

      # ── Commit version update ──────────────────────────────────────────────
      - name: Commit and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit (version already up to date)"
          else
            git commit -m "chore(deploy): update image tag to $VERSION [skip ci]"
            git push
          fi

      # ── Tag release (idempotent — skip if exists) ──────────────────────────
      - name: Create Git tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "ℹ️ Tag $VERSION already exists — skipping"
          else
            git tag -a "$VERSION" -m "Release $VERSION"
            git push origin "$VERSION"
            echo "✅ Tag $VERSION created and pushed"
          fi

      # ── GitHub Release (idempotent — skip if exists) ────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # Skip if release already exists

      # ── Validation ─────────────────────────────────────────────────────────
      - name: Validate deployment consistency
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "══════════════════════════════════════"
          echo "✅ Deployment Summary"
          echo "   Version:        $VERSION"
          echo "   Backend Image:  hms/backend:$VERSION"
          echo "   Frontend Image: hms/frontend:$VERSION"
          echo "   Helm Version:   ${VERSION#v}"
          echo "   Git Tag:        $VERSION"
          echo "   GitHub Release: $VERSION"
          echo "══════════════════════════════════════"
          echo ""
          echo "🔄 ArgoCD will auto-sync within configured interval."
          echo "   ArgoCD Image Updater will detect the new tag."
