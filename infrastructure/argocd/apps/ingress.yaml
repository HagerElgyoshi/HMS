apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hms-ingress
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: hms
    app.kubernetes.io/component: ingress
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: hms

  source:
    repoURL: https://github.com/OWNER/hospital-management-system.git
    targetRevision: main
    path: infrastructure/helm/ingress

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: hms-production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false

  revisionHistoryLimit: 5
