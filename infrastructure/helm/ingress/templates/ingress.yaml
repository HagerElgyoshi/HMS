apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hms-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    {{- range $key, $value := .Values.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- if .Values.tls.enabled }}
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.tls.certificateArn | quote }}
    {{- end }}
spec:
  ingressClassName: alb
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          # Backend API routes
          - path: {{ .Values.backend.pathPrefix }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.backend.serviceName }}
                port:
                  number: {{ .Values.backend.servicePort }}
          # Actuator health (for ALB health checks)
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.backend.serviceName }}
                port:
                  number: {{ .Values.backend.servicePort }}
          # Swagger API docs
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.backend.serviceName }}
                port:
                  number: {{ .Values.backend.servicePort }}
          - path: /v3/api-docs
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.backend.serviceName }}
                port:
                  number: {{ .Values.backend.servicePort }}
          # Uploaded files (temporary — will move to S3/CloudFront)
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.backend.serviceName }}
                port:
                  number: {{ .Values.backend.servicePort }}
          # Frontend (catch-all — must be last)
          - path: {{ .Values.frontend.pathPrefix }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.frontend.serviceName }}
                port:
                  number: {{ .Values.frontend.servicePort }}
