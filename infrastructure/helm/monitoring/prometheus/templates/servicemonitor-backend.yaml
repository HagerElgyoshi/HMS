# ServiceMonitor for Spring Boot Backend (Actuator + Micrometer)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hms-backend
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: hms
    app.kubernetes.io/component: backend
spec:
  namespaceSelector:
    matchNames:
      - hms-production
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
