# =============================================================================
#  Prometheus Alerting Rules — HMS Application
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hms-application-rules
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: hms
    prometheus: kube-prometheus
spec:
  groups:
    # ── Critical Alerts ──────────────────────────────────────────────────────
    - name: hms.critical
      rules:
        - alert: PodCrashLoopBackOff
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="hms-production"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted more than 3 times in 15 minutes."
            runbook_url: "https://docs.hms.internal/runbooks/crashloop"

        - alert: HighHTTP5xxRate
          expr: |
            sum(rate(http_server_requests_seconds_count{namespace="hms-production",status=~"5.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count{namespace="hms-production"}[5m])) > 0.05
          for: 3m
          labels:
            severity: critical
            team: backend
          annotations:
            summary: "HTTP 5xx error rate above 5%"
            description: "Backend is returning >5% server errors. Current rate: {{ $value | humanizePercentage }}."

        - alert: DatabaseConnectivityFailure
          expr: |
            hikaricp_connections_active{namespace="hms-production"} == 0
            and hikaricp_connections_pending{namespace="hms-production"} > 0
          for: 2m
          labels:
            severity: critical
            team: backend
          annotations:
            summary: "Database connectivity failure"
            description: "No active DB connections and pending requests exist. Check RDS connectivity."

        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Node {{ $labels.node }} is NotReady"

    # ── Warning Alerts ───────────────────────────────────────────────────────
    - name: hms.warning
      rules:
        - alert: HighCPUUsage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{namespace="hms-production",container!=""}[5m])) by (pod)
            / sum(kube_pod_container_resource_limits{namespace="hms-production",resource="cpu"}) by (pod) > 0.85
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Pod {{ $labels.pod }} CPU usage above 85%"

        - alert: HighMemoryUsage
          expr: |
            sum(container_memory_working_set_bytes{namespace="hms-production",container!=""}) by (pod)
            / sum(kube_pod_container_resource_limits{namespace="hms-production",resource="memory"}) by (pod) > 0.85
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Pod {{ $labels.pod }} memory usage above 85%"

        - alert: HighResponseTime
          expr: |
            histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{namespace="hms-production"}[5m])) > 2
          for: 5m
          labels:
            severity: warning
            team: backend
          annotations:
            summary: "P95 response time above 2 seconds"
            description: "95th percentile latency: {{ $value | humanizeDuration }}."

        - alert: PodRestartStorm
          expr: |
            sum(increase(kube_pod_container_status_restarts_total{namespace="hms-production"}[1h])) by (pod) > 5
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Pod {{ $labels.pod }} restarted {{ $value }} times in 1h"

        - alert: HealthCheckFailing
          expr: |
            kube_pod_container_status_ready{namespace="hms-production"} == 0
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Pod {{ $labels.pod }} health check failing"

        - alert: DiskUsageHigh
          expr: |
            kubelet_volume_stats_used_bytes{namespace="hms-production"}
            / kubelet_volume_stats_capacity_bytes{namespace="hms-production"} > 0.80
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} disk usage above 80%"

    # ── Info Alerts ──────────────────────────────────────────────────────────
    - name: hms.info
      rules:
        - alert: HPAMaxedOut
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas{namespace="hms-production"}
            == kube_horizontalpodautoscaler_spec_max_replicas{namespace="hms-production"}
          for: 15m
          labels:
            severity: info
            team: platform
          annotations:
            summary: "HPA {{ $labels.horizontalpodautoscaler }} is at max replicas"

        - alert: JVMHeapUsageHigh
          expr: |
            jvm_memory_used_bytes{namespace="hms-production",area="heap"}
            / jvm_memory_max_bytes{namespace="hms-production",area="heap"} > 0.80
          for: 10m
          labels:
            severity: info
            team: backend
          annotations:
            summary: "JVM heap usage above 80% on {{ $labels.pod }}"
