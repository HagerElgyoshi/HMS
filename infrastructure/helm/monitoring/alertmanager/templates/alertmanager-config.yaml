# =============================================================================
#  Alertmanager Configuration — Routing & Receivers
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: hms
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default
      group_by: [alertname, namespace, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

      routes:
        # Critical → immediate notification
        - match:
            severity: critical
          receiver: critical-alerts
          group_wait: 10s
          repeat_interval: 1h

        # Warning → standard notification
        - match:
            severity: warning
          receiver: warning-alerts
          group_wait: 1m
          repeat_interval: 4h

        # Info → low priority
        - match:
            severity: info
          receiver: info-alerts
          repeat_interval: 12h

    receivers:
      - name: default
        webhook_configs:
          - url: {{ .Values.slack_webhook_url | default "http://placeholder" | quote }}
            send_resolved: true

      - name: critical-alerts
        webhook_configs:
          - url: {{ .Values.slack_webhook_url | default "http://placeholder" | quote }}
            send_resolved: true
        # pagerduty_configs:
        #   - service_key: {{ .Values.pagerduty_key | quote }}

      - name: warning-alerts
        webhook_configs:
          - url: {{ .Values.slack_webhook_url | default "http://placeholder" | quote }}
            send_resolved: true

      - name: info-alerts
        webhook_configs:
          - url: {{ .Values.slack_webhook_url | default "http://placeholder" | quote }}
            send_resolved: false

    inhibit_rules:
      # If critical is firing, suppress warning for same alertname
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: [alertname, namespace]
