apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "backend.fullname" . }}-config
  namespace: {{ include "hms.namespace" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.env.configMap }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
