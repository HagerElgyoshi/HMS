{{/*
  Secret for backend sensitive configuration.
  Values must be injected at deploy time via:
    --set env.secret.DATABASE_URL=... 
  Or via an External Secrets Operator / sealed-secrets.
  
  This template creates the Secret resource with placeholder keys.
  Actual values are NEVER stored in this chart or in version control.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backend.fullname" . }}-secret
  namespace: {{ include "hms.namespace" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range .Values.env.secretKeys }}
  {{ . }}: {{ index $.Values.env.secret . | default "" | quote }}
  {{- end }}
