{{- if .Values.persistence.enabled }}
# TEMPORARY: This PVC will be removed when uploads migrate to Amazon S3.
# At that point, set persistence.enabled=false in values.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "backend.fullname" . }}-uploads
  namespace: {{ include "hms.namespace" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
