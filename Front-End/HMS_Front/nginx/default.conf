# =============================================================================
#  Nginx server block — React SPA + reverse proxy to backend
#
#  BACKEND PROXY:
#  The /api location proxies requests to the backend service. The upstream name
#  "backend" matches the Docker Compose service name (resolved via Docker DNS).
#  In Kubernetes, this will be replaced by the Service name (e.g. hms-backend).
# =============================================================================

upstream backend_upstream {
    server hms-backend:8080;
}

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"        always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ── Static asset caching ──────────────────────────────────────────────────
    # Vite produces content-hashed filenames; safe to cache aggressively.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Reverse proxy: /api → backend ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Reverse proxy: /actuator → backend (health checks, metrics) ───────────
    location /actuator/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Reverse proxy: /swagger → backend (API docs) ──────────────────────────
    location /swagger-ui/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
    location /v3/api-docs {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Uploaded files proxy → backend (future: S3/CloudFront) ────────────────
    location /uploads/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── React SPA routing (client-side routes) ────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny hidden files ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
